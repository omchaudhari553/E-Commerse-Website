name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3. Build all microservices with Maven
      - name: Build All Microservices
        run: mvn clean install -DskipTests

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Docker Images for all services
      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/eureka-server:latest ./eureka-server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/config-server:latest ./config-server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest ./api-gateway-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest ./auth-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest ./user-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest ./product-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest ./cart-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest ./order-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service:latest ./recommendation-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest ./notification-service

      # 6. Push all Docker Images to Docker Hub
      - name: Push Images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/eureka-server:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/config-server:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest

      # 7. Deploy to EC2 via SSH
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop and remove existing containers
            docker-compose -f /path/to/docker-compose.yml down || true
            
            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/eureka-server:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/config-server:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest
            
            # Start all services with docker-compose
            docker-compose -f /path/to/docker-compose.yml up -d
